<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 | 관리자 채팅 사이트</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <h1 class="title">관리자 채팅 사이트</h1>
        <p class="subtitle">승인된 회원만 실시간 채팅에 참여할 수 있습니다.</p>

        <form id="login-form">
          <label class="field">
            <span>아이디</span>
            <input type="text" name="username" required />
          </label>

          <label class="field">
            <span>비밀번호</span>
            <input type="password" name="password" required />
          </label>

          <button type="submit" class="btn primary">로그인</button>
        </form>

        <p class="status" id="status"></p>
        <p>계정이 없으면 <a href="/signup">회원가입</a> 해주세요.</p>
      </section>
    </main>
    <script src="/assets/login.js"></script>
  </body>
</html>
